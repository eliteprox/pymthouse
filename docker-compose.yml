services:
  go-livepeer:
    image: livepeer/go-livepeer:latest
    command:
      - -remoteSigner
      - -network=${SIGNER_NETWORK:-arbitrum-one-mainnet}
      - -httpAddr=0.0.0.0:${SIGNER_PORT:-8081}
      - -cliAddr=0.0.0.0:4935
      - -ethUrl=${ETH_RPC_URL:-http://nyc-router.eliteencoder.net:3517}
      - -ethPassword=/data/.eth-password
      - -ethAcctAddr=${SIGNER_ETH_ADDR:-0x0074780feff1fd0277fad6ccdb5a29908df6051f}
      - -datadir=/data
      - -v=99
    volumes:
      - ./data:/data
    environment:
      - SIGNER_PORT=${SIGNER_PORT:-8081}
      - SIGNER_REMOTE_DISCOVERY=${SIGNER_REMOTE_DISCOVERY:-0}
      - ORCH_WEBHOOK_URL=${ORCH_WEBHOOK_URL:-}
      - LIVE_AI_CAP_REPORT_INTERVAL=${LIVE_AI_CAP_REPORT_INTERVAL:-}
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ ! -f /data/.eth-password ]; then
          echo "" > /data/.eth-password
        fi
        # Strip empty -ethAcctAddr if not set
        ARGS=""
        for arg in "$$@"; do
          case "$$arg" in
            -ethAcctAddr=) ;; # skip empty
            *) ARGS="$$ARGS $$arg" ;;
          esac
        done
        # Add remote discovery flags when enabled
        if [ "$$SIGNER_REMOTE_DISCOVERY" = "1" ] || [ "$$SIGNER_REMOTE_DISCOVERY" = "true" ]; then
          ARGS="$$ARGS -remoteDiscovery=true"
          [ -n "$$ORCH_WEBHOOK_URL" ] && ARGS="$$ARGS -orchWebhookUrl=$$ORCH_WEBHOOK_URL"
          [ -n "$$LIVE_AI_CAP_REPORT_INTERVAL" ] && ARGS="$$ARGS -liveAICapReportInterval=$$LIVE_AI_CAP_REPORT_INTERVAL"
        fi
        exec /usr/local/bin/livepeer $$ARGS
      - --
    ports:
      - "${SIGNER_PORT:-8081}:${SIGNER_PORT:-8081}"  # httpAddr - signer HTTP API
      - "127.0.0.1:4935:4935"  # cliAddr - admin CLI API (localhost only, not exposed externally)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${SIGNER_PORT:-8081}/status"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

