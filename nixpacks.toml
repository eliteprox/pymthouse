# Nixpacks configuration for Railway
# Downloads and runs the livepeer binary

[phases.setup]
nixPkgs = ["wget", "gnutar"]

[phases.install]
cmds = [
  "wget -q https://github.com/livepeer/go-livepeer/releases/download/v0.8.10/livepeer-linux-amd64.tar.gz",
  "tar -xzf livepeer-linux-amd64.tar.gz",
  "mv livepeer-linux-amd64/livepeer ./livepeer",
  "chmod +x livepeer",
  "rm -rf livepeer-linux-amd64.tar.gz livepeer-linux-amd64"
]

[phases.build]
cmds = ["mkdir -p data", "echo '' > .eth-password"]

[start]
cmd = "./livepeer -remoteSigner -network=${SIGNER_NETWORK:-arbitrum-one-mainnet} -httpAddr=0.0.0.0:${PORT:-8081} -cliAddr=0.0.0.0:4935 -ethUrl=${ETH_RPC_URL:-https://arb1.arbitrum.io/rpc} -ethPassword=./.eth-password -datadir=./data -v=99"
